name: LegendaryShop
version: 2.8
main: com.trongphu.shopplugin.trongphu
description: "🛍️ Professional Shop System with Sell Feature"
authors:
  - trongphu

api-version: '1.21'

depend:
  - Vault

softdepend:
  - PlaceholderAPI
  - xShards

commands:
  shop:
    description: "Mở cửa hàng hoặc quản lý tiền (admin)"
    usage: "/shop [admin|reload]"
    aliases:
      - s
    permission: legendaryshop.use
    permission-message: "❌ Bạn không có quyền dùng lệnh này!"
  
  sell:
    description: "Bán item trong tay hoặc inventory"
    usage: "/sell [hand|all]"
    aliases:
      - banhang
      - selltome
    permission: legendaryshop.sell
    permission-message: "❌ Bạn không có quyền bán đồ!"

permissions:
  legendaryshop.*:
    description: "Tất cả quyền LegendaryShop"
    default: op
    children:
      legendaryshop.use: true
      legendaryshop.sell: true
      legendaryshop.admin: true
  
  legendaryshop.use:
    description: "Mở cửa hàng bằng /shop"
    default: true
  
  legendaryshop.sell:
    description: "Dùng lệnh /sell để bán item"
    default: true
  
  legendaryshop.admin:
    description: "Dùng /shop admin và /shop reload"
    default: op
  
  legendaryshop.admin.add:
    description: "Cộng tiền cho player (/shop admin add)"
    default: op
  
  legendaryshop.admin.remove:
    description: "Trừ tiền từ player (/shop admin remove)"
    default: op
  
  legendaryshop.admin.set:
    description: "Đặt tiền cho player (/shop admin set)"
    default: op
  
  legendaryshop.admin.reload:
    description: "Tải lại config (/shop reload)"
    default: op
